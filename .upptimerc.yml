# MailHow status page (Upptime). Managed from the main repo: see
# mailhow/deploy/upptime/README.md.
owner: Web3-al
repo: mailhow-status

sites:
  - name: Website
    url: https://mailhow.com
  - name: App
    url: https://app.mailhow.com/login
  - name: Mail server (JMAP/HTTPS)
    url: https://mail.mailhow.com/jmap/session
    # Unauthenticated request returns 401 — that means the server is up.
    expectedStatusCodes:
      - 401
      - 200
  - name: IMAP
    url: mail.mailhow.com
    check: "tcp-ping"
    port: 993
  - name: SMTP submission
    url: mail.mailhow.com
    check: "tcp-ping"
    port: 465
  - name: Inbound SMTP
    url: mail.mailhow.com
    check: "tcp-ping"
    port: 25

status-website:
  cname: status.mailhow.com
  name: MailHow
  introTitle: "MailHow status"
  introMessage: Live status of the MailHow website, app, and mail servers.
  navbar:
    - title: Status
      href: /
    - title: MailHow
      href: https://mailhow.com

assignees:
  - Web3-al

i18n:
  activeIncidents: Active incidents
